version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: crm_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: crm
    volumes:
      - mongodb_data:/data/db
    networks:
      - crm_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: crm_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - crm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - crm_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  channel-service:
    build:
      context: ./channel-service
      dockerfile: Dockerfile
    container_name: crm_channel_service
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ./channel-service/.env
    networks:
      - crm_network
    volumes:
      - ./channel-service:/app
      - /app/node_modules

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: crm_ai_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    depends_on:
      - mongodb
      - qdrant
    networks:
      - crm_network
    volumes:
      - ./ai-service:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - crm_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:
  qdrant_data:

networks:
  crm_network:
    driver: bridge
